name: Daily Cost Digest

on:
  schedule:
    # Run daily at 8:00 AM UTC (adjust time as needed)
    - cron: '0 8 * * *'
  
  # Allow manual runs for testing
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run digest for (YYYY-MM-DD, defaults to yesterday)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (don\'t post to Slack)'
        required: false
        type: boolean
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run cost digest
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL || '#infra-costs' }}
        MONTHLY_BUDGET_USD: ${{ secrets.MONTHLY_BUDGET_USD }}
        ANOMALY_THRESHOLD_PCT: ${{ secrets.ANOMALY_THRESHOLD_PCT || '100' }}
        TOP_MOVERS_COUNT: ${{ secrets.TOP_MOVERS_COUNT || '5' }}
        LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS || '7' }}
        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      run: |
        if [ -n "${{ github.event.inputs.date }}" ]; then
          python bot/digest.py --date "${{ github.event.inputs.date }}"
        else
          python bot/digest.py
        fi
    
    - name: Upload database artifact (for debugging)
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: cost-database
        path: data/costs.db
        retention-days: 7
